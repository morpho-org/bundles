[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
via_ir = true
optimizer = true
optimizer_runs = 4294967295
evm_version = "osaka"
bytecode_hash = "none"

[lint]
exclude_lints = ["block-timestamp"]

[rpc_endpoints]
1 = "https://eth-mainnet.g.alchemy.com/v2/${ALCHEMY_KEY}"

[[profile.default.additional_compiler_profiles]]
name = "paris-999999"
evm_version = "paris"
optimizer_runs = 999999

[[profile.default.additional_compiler_profiles]]
name = "osaka-466"
